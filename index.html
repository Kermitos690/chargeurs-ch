<script>
(()=>{"use strict";const K="chg_demo_operational_v2",A="chg_demo_auth_v2";const routes=[["GET","/v1/health"],["GET","/v1/health/details"],["GET","/v1/me"],["GET","/v1/stations"],["GET","/v1/stations/:stationId"],["GET","/v1/stations/:stationId/availability"],["GET","/v1/stations/:stationId/inventory"],["POST","/v1/pricing/quote"],["GET","/v1/rentals"],["POST","/v1/rentals"],["GET","/v1/rentals/:rentalIdOrCode"],["GET","/v1/rentals/:rentalIdOrCode/events"],["POST","/v1/rentals/:rentalIdOrCode/checkout"],["POST","/v1/rentals/:rentalIdOrCode/cancel"],["POST","/v1/stations/:stationId/sync"]];const seed=()=>({users:[{id:"u1",role:"client",name:"Gaëtan Démo",email:"client@chargeurs.ch",pass:"Demo123!"},{id:"u2",role:"admin",name:"Administrateur Démo",email:"admin@chargeurs.ch",pass:"Admin123!"}],stations:[{id:"DTA21269",name:"Lausanne Centre",online:true,cap:8,available:5},{id:"DTA21277",name:"Lausanne Gare",online:true,cap:8,available:4},{id:"DTA22032",name:"Ouchy",online:true,cap:8,available:6}],rentals:[{id:"r1",code:"CHG-4M8R2Q",userId:"u1",stationId:"DTA21277",returnStationId:"DTA22032",batteryId:"BAT-1277-04",tradeNo:"TRD-DEMO-004",status:"completed",method:"card",minutes:281,final:750,authorized:3000,captured:750,refunded:0,extra:0,started:new Date(Date.now()-97200000).toISOString(),returned:new Date(Date.now()-79200000).toISOString()},{id:"r2",code:"CHG-1V6N5T",userId:"u1",stationId:"DTA22032",returnStationId:null,batteryId:null,tradeNo:"TRD-DEMO-005",status:"refunded",method:"twint",minutes:0,final:0,authorized:3000,captured:3000,refunded:3000,extra:0,started:new Date(Date.now()-180000000).toISOString()}],events:[],incidents:[{id:"i1",title:"Retour ambigu bloqué",detail:"tradeNo manquant : aucun débit automatique.",open:true},{id:"i2",title:"Webhook partenaire rejoué",detail:"Livraison réussie à la deuxième tentative.",open:false}],selectedStation:"DTA21269",current:null,minutes:95,ep:0,idem:{}});let s=(()=>{try{return Object.assign(seed(),JSON.parse(localStorage.getItem(K)||"{}"))}catch{return seed()}})(),auth=(()=>{try{return JSON.parse(localStorage.getItem(A)||"null")}catch{return null}})();const save=()=>localStorage.setItem(K,JSON.stringify(s)),saveAuth=()=>auth?localStorage.setItem(A,JSON.stringify(auth)):localStorage.removeItem(A),esc=x=>String(x??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])),id=p=>p+"_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6),money=c=>new Intl.NumberFormat("fr-CH",{style:"currency",currency:"CHF"}).format((c||0)/100),dt=x=>x?new Intl.DateTimeFormat("fr-CH",{dateStyle:"short",timeStyle:"short"}).format(new Date(x)):"—",user=()=>auth?s.users.find(x=>x.id===auth.userId):null,station=x=>s.stations.find(y=>y.id===x),rental=x=>s.rentals.find(y=>y.id===x||y.code===x),current=()=>rental(s.current);function toast(x){let t=document.querySelector("#toast");t.textContent=x;t.style.display="block";clearTimeout(t._h);t._h=setTimeout(()=>t.style.display="none",2600)}function quote(m){m=Math.max(0,+m||0);let blocks=Math.ceil(m/30),raw=blocks*75,days=Math.max(1,Math.ceil(m/1440));return{currency:"CHF",duration_minutes:m,billing_blocks:blocks,hourly_rate_cents:150,block_minutes:30,raw_cents:raw,day_cap_cents:days*1800,total_cents:Math.min(raw,days*1800),deposit_cents:3000,non_return_total_cents:9900}}function event(type,title,rid=null,meta={}){s.events.unshift({id:id("e"),type,title,rid,meta,at:new Date().toISOString()});s.events=s.events.slice(0,150)}function code(){return"CHG-"+Math.random().toString(36).slice(2,8).toUpperCase()}function createRental(stationId,key){if(key&&s.idem[key])return s.idem[key];let st=station(stationId);if(!st||!st.online||st.available<1)throw Error("Station indisponible");let r={id:id("r"),code:code(),userId:user()?.role==="client"?user().id:null,stationId,returnStationId:null,batteryId:null,tradeNo:"TRD-"+Math.random().toString(36).slice(2,10).toUpperCase(),status:"created",method:null,minutes:0,final:0,authorized:0,captured:0,refunded:0,extra:0,started:new Date().toISOString()};s.rentals.unshift(r);s.current=r.id;event("rental.created","Location "+r.code+" créée",r.id,{stationId});if(key)s.idem[key]=r;save();return r}function checkout(rid,method,key){if(key&&s.idem[key])return s.idem[key];let r=rental(rid),st=station(r.stationId);if(!r||r.status!=="created")throw Error("État incompatible");r.method=method;r.authorized=3000;if(method==="card"){r.captured=0;event("rental.payment_authorized","Autorisation carte 30 CHF",r.id)}else{r.captured=3000;event("rental.payment_succeeded","Prépaiement TWINT 30 CHF",r.id)}if(!st||st.available<1){if(method==="card"){r.authorized=0;r.status="cancelled"}else{r.refunded=3000;r.status="refunded"}s.incidents.unshift({id:id("i"),title:"Échec d’éjection",detail:"Compensation financière exécutée.",open:true});save();return r}st.available--;r.batteryId="BAT-"+st.id.slice(-4)+"-"+(st.cap-st.available);r.status="active";r.started=new Date().toISOString();event("rental.active","Batterie éjectée",r.id,{batteryId:r.batteryId,tradeNo:r.tradeNo});if(key)s.idem[key]=r;save();return r}function settle(rid,returnStation,nonReturn=false){let r=rental(rid),st=station(returnStation);if(!r||r.status!=="active"||!st)throw Error("Retour impossible");r.returnStationId=returnStation;r.returned=new Date().toISOString();r.minutes=s.minutes;st.available=Math.min(st.cap,st.available+1);event("rental.returned","Retour corrélé par batterie et tradeNo",r.id,{batteryId:r.batteryId,tradeNo:r.tradeNo});if(nonReturn){r.final=9900;r.captured=3000;r.extra=6900;r.status="additional_payment_required";s.incidents.unshift({id:id("i"),title:"Complément de 69 CHF requis",detail:"Aucun débit hors session automatique.",open:true});event("rental.non_return","Non-retour : total cible 99 CHF",r.id)}else{let q=quote(s.minutes);r.final=q.total_cents;if(r.method==="card"){r.captured=q.total_cents;event("payment.captured","Capture carte "+money(q.total_cents),r.id)}else{r.refunded=3000-q.total_cents;event("payment.refunded","Remboursement TWINT "+money(r.refunded),r.id)}r.status="completed";event("rental.completed","Location clôturée",r.id,{final:r.final})}s.current=null;save();return r}function cancel(rid){let r=rental(rid);if(!r||r.status==="active")throw Error("Annulation impossible après éjection");r.status=r.method==="twint"?"refunded":"cancelled";if(r.method==="twint")r.refunded=r.captured;else r.authorized=0;event("rental.cancelled","Location annulée",r.id);s.current=null;save();return r}const labels={created:["Créée",""],active:["En cours","ok"],completed:["Terminée","ok"],refunded:["Remboursée","warnc"],cancelled:["Annulée",""],additional_payment_required:["Complément requis","warnc"]};const badge=x=>{let a=labels[x]||[x,""];return`<span class="badge ${a[1]}">${esc(a[0])}</span>`},metric=(a,b,c)=>`<div class="card"><div class="muted small">${esc(a)}</div><div class="val">${esc(b)}</div><div class="muted small">${esc(c)}</div></div>`,nav=(id,l)=>`<button class="nav" data-page="${id}">${l}</button>`;function timeline(es){return es.length?es.map(e=>`<div style="padding:10px 0;border-bottom:1px solid var(--bd)"><b>${esc(e.title)}</b><div class="muted small code">${esc(e.type)} · ${dt(e.at)}</div></div>`).join(""):`<div class="muted">Les événements apparaîtront après une action.</div>`}function rentalTable(rs,admin=false){return`<div class="table"><table><thead><tr><th>Code</th><th>Borne</th><th>Batterie</th><th>Paiement</th><th>Durée</th><th>Final</th><th>Statut</th>${admin?"<th></th>":""}</tr></thead><tbody>${rs.map(r=>`<tr><td class="code">${r.code}</td><td>${r.stationId}</td><td class="code">${r.batteryId||"—"}</td><td>${r.method||"—"}</td><td>${r.minutes||0} min</td><td>${money(r.final)}</td><td>${badge(r.status)}</td>${admin?`<td><button class="btn sm" data-inspect="${r.id}">Voir</button></td>`:""}</tr>`).join("")}</tbody></table></div>`}function overview(){let rev=s.rentals.reduce((a,r)=>a+r.captured-r.refunded,0);return`<section class="page" id="overview"><div class="hero"><div class="ey">Démo fondée sur les contrats API v1</div><h1>Tout Chargeurs.ch, réellement cliquable.</h1><p class="muted">Création de location, paiement carte/TWINT, éjection, retour, règlement, comptes, administration et explorateur API fonctionnent dans ce navigateur.</p><div class="heroact"><button class="btn primary" data-page="kiosk">Lancer une location</button><button class="btn" data-page="api">Tester les API</button></div><div class="pills"><span class="badge">30 CHF caution</span><span class="badge">1,50 CHF/h</span><span class="badge">30 min</span><span class="badge">18 CHF/jour</span><span class="badge">99 CHF non-retour</span></div></div><div class="grid metrics">${metric("Bornes en ligne",s.stations.filter(x=>x.online).length+"/3","Inventaire modifiable")}${metric("Locations actives",s.rentals.filter(x=>x.status==="active").length,"Éjection simulée")}${metric("Incidents ouverts",s.incidents.filter(x=>x.open).length,"Fail-closed")}${metric("Net démo",money(rev),"Aucun argent réel")}</div><h2>Derniers événements</h2><div class="panel">${timeline(s.events.slice(0,10))}</div></section>`}function publicSite(){return`<section class="page" id="site"><div class="hero"><div class="ey">Site public</div><h1>Une batterie en quelques secondes.</h1><p class="muted">Choisis une borne, autorise la caution et récupère une powerbank.</p></div><h2>Bornes</h2><div class="grid cards">${s.stations.map(st=>`<div class="card"><div class="station"><div><h3>${st.name}</h3><div class="muted code">${st.id}</div></div><span class="badge ${st.online?"ok":"badc"}">${st.online?"En ligne":"Hors ligne"}</span></div><div class="val">${st.available}/${st.cap}</div><div class="muted small">Batteries disponibles</div><div class="heroact"><button class="btn primary" data-station="${st.id}">Louer ici</button></div></div>`).join("")}</div></section>`}function kiosk(){let st=station(s.selectedStation),r=current(),q=quote(s.minutes),body=!r?`<div class="qr"></div><div class="muted" style="text-align:center">Borne ${st.id} · ${st.name}</div><div class="price"><div class="line"><span>Caution</span><b>30 CHF</b></div><div class="line"><span>Tarif</span><b>1,50 CHF/h</b></div><div class="line"><span>Plafond</span><b>18 CHF/jour</b></div></div><div class="kact"><button class="btn primary" data-act="start">Démarrer</button></div>`:r.status==="created"?`<div class="qr"></div><h3 style="text-align:center">${r.code}</h3><p class="muted" style="text-align:center">Choisis le paiement</p><div class="kact"><button class="btn primary" data-act="card">Carte / Apple Pay</button><button class="btn good" data-act="twint">TWINT</button><button class="btn bad" data-act="cancel">Annuler</button></div>`:r.status==="active"?`<div class="timer" id="timer">00:00:00</div><h3 style="text-align:center">${r.batteryId}</h3><div class="field"><label>Durée simulée : <b id="minsLabel">${s.minutes} min</b></label><input id="mins" type="range" min="5" max="2880" step="5" value="${s.minutes}"></div><div class="price"><div class="line"><span>Montant calculé</span><b id="quote">${money(q.total_cents)}</b></div><div class="line"><span>Méthode</span><b>${r.method}</b></div></div><div class="kact"><button class="btn good" data-act="return">Retourner</button><button class="btn warn" data-act="nonreturn">Non-retour</button></div>`:`<div style="margin:auto;text-align:center"><h2>${badge(r.status)}</h2><p class="muted">${r.code} · ${money(r.final)}</p><button class="btn primary" data-act="new">Nouvelle location</button></div>`;return`<section class="page" id="kiosk"><div class="grid two"><div><div class="hero"><div class="ey">Kiosk opérationnel</div><h1>Parcours complet.</h1><p class="muted">Le moteur applique les règles de la documentation API et paiement.</p></div><h2>Station</h2><div class="panel"><div class="field"><label>Borne</label><select id="stationSel">${s.stations.map(x=>`<option value="${x.id}" ${x.id===st.id?"selected":""}>${x.id} — ${x.name} (${x.available})</option>`).join("")}</select></div></div></div><div class="kiosk"><div class="screen"><div class="ktitle">chargeurs.ch</div>${body}</div></div></div></section>`}function client(){let u=user();if(!u||u.role!=="client")return`<section class="page" id="client"><div class="panel" style="max-width:570px;margin:30px auto"><div class="ey">Compte client</div><h2>Connexion démo</h2><p class="muted">client@chargeurs.ch · Demo123!</p><div class="heroact"><button class="btn primary" data-login="client">Se connecter</button></div></div></section>`;let rs=s.rentals.filter(r=>r.userId===u.id);return`<section class="page" id="client"><div class="hero"><div class="ey">Compte client</div><h1>Bonjour ${u.name}</h1><p class="muted">${u.email} · compte vérifié</p><div class="heroact"><button class="btn primary" data-page="kiosk">Nouvelle location</button><button class="btn bad" data-act="logout">Déconnexion</button></div></div><div class="grid metrics">${metric("Locations",rs.length,"Historique local")}${metric("Actives",rs.filter(x=>x.status==="active").length,"En temps réel")}${metric("Capturé",money(rs.reduce((a,r)=>a+r.captured,0)),"Démonstration")}${metric("Remboursé",money(rs.reduce((a,r)=>a+r.refunded,0)),"Démonstration")}</div><h2>Mes locations</h2>${rentalTable(rs)}</section>`}function admin(){let u=user();if(!u||u.role!=="admin")return`<section class="page" id="admin"><div class="panel" style="max-width:570px;margin:30px auto"><div class="ey">Administration</div><h2>Connexion démo</h2><p class="muted">admin@chargeurs.ch · Admin123!</p><div class="heroact"><button class="btn primary" data-login="admin">Se connecter</button></div></div></section>`;return`<section class="page" id="admin"><div class="hero"><div class="ey">Back-office</div><h1>Supervision complète.</h1><p class="muted">Bornes, locations, paiements, incidents et événements.</p><div class="heroact"><button class="btn bad" data-act="logout">Déconnexion</button><button class="btn" data-act="reset">Réinitialiser</button></div></div><h2>Bornes</h2><div class="grid cards">${s.stations.map(st=>`<div class="card"><div class="station"><h3>${st.name}</h3><span class="badge ${st.online?"ok":"badc"}">${st.online?"En ligne":"Hors ligne"}</span></div><div class="val">${st.available}/${st.cap}</div><div class="heroact"><button class="btn sm" data-sync="${st.id}">Synchroniser</button><button class="btn sm" data-toggle="${st.id}">Changer état</button></div></div>`).join("")}</div><h2>Locations et paiements</h2>${rentalTable(s.rentals,true)}<h2>Incidents</h2><div class="grid two">${s.incidents.map(i=>`<div class="card"><div class="station"><h3>${i.title}</h3><span class="badge ${i.open?"warnc":"ok"}">${i.open?"Ouvert":"Résolu"}</span></div><p class="muted">${i.detail}</p>${i.open?`<div class="heroact"><button class="btn sm good" data-resolve="${i.id}">Résoudre</button></div>`:""}</div>`).join("")}</div><h2>Événements</h2><div class="panel">${timeline(s.events.slice(0,30))}</div></section>`}function resolvePath(p){let r=s.rentals[0];return p.replace(":stationId",s.selectedStation).replace(":rentalIdOrCode",r?.code||"CHG-DEMO").replace(":rentalId",r?.id||"r1")}function sample(m,p){if(p==="/v1/pricing/quote")return{duration_minutes:95};if(p==="/v1/rentals")return{station_id:s.selectedStation,external_reference:"demo-web"};if(p.endsWith("/checkout"))return{payment_method:"card"};if(p.endsWith("/sync"))return{available:5};return{}}function api(){let e=routes[s.ep];return`<section class="page" id="api"><div class="hero"><div class="ey">Platform API v1</div><h1>Teste les routes documentées.</h1><p class="muted">Clé test, idempotence, stations, tarification, locations, checkout, annulation et synchronisation.</p><div class="pills"><span class="badge code">Bearer chg_test_demo_public</span><span class="badge warnc">LIVE désactivé</span></div></div><h2>Explorateur</h2><div class="api"><div class="panel eps">${routes.map((x,i)=>`<button class="ep ${i===s.ep?"on":""}" data-ep="${i}"><span class="method">${x[0]}</span><span class="code">${x[1]}</span></button>`).join("")}</div><div class="panel"><div class="form"><div class="field"><label>Méthode</label><input id="am" value="${e[0]}" readonly></div><div class="field"><label>Route</label><input id="ap" value="${resolvePath(e[1])}"></div><div class="field full"><label>Corps JSON</label><textarea id="ab">${JSON.stringify(sample(e[0],e[1]),null,2)}</textarea></div><div class="field"><label>X-Idempotency-Key</label><input id="ai" value="demo-${Date.now()}"></div><div class="field"><label>Clé API</label><input value="chg_test_demo_public" readonly></div></div><div class="heroact"><button class="btn primary" data-act="send">Envoyer</button></div><h3 style="margin-top:16px">Réponse</h3><pre id="resp">Clique sur Envoyer.</pre></div></div></section>`}function mock(method,path,body,key){try{let data;if(method==="GET"&&path==="/v1/health")data={status:"ok",service:"chargeurs-platform-api",version:"v1",mode:"demo"};else if(method==="GET"&&path==="/v1/health/details")data={status:"ok",database:"localStorage",stripe:"test-simulated",chargenow:"simulated",live_enabled:false};else if(method==="GET"&&path==="/v1/me")data={client_id:"demo-public",environment:"test",scopes:["health:read","stations:read","inventory:read","pricing:read","rentals:read","rentals:write","payments:write","stations:write"]};else if(method==="GET"&&path==="/v1/stations")data={data:s.stations};else if(method==="POST"&&path==="/v1/pricing/quote")data=quote(body.duration_minutes||95);else if(method==="GET"&&path==="/v1/rentals")data={data:s.rentals};else if(method==="POST"&&path==="/v1/rentals")data=createRental(body.station_id||s.selectedStation,key);else{let sm=path.match(/^\/v1\/stations\/([^/]+)(?:\/(availability|inventory|sync))?$/),rm=path.match(/^\/v1\/rentals\/([^/]+)(?:\/(events|checkout|cancel))?$/);if(sm){let st=station(sm[1]),a=sm[2];if(!st)throw Error("Station introuvable");if(!a)data=st;else if(a==="availability")data={station_id:st.id,online:st.online,available:st.available,return_slots:st.cap-st.available};else if(a==="inventory")data={station_id:st.id,capacity:st.cap,batteries_available:st.available,batteries_out:st.cap-st.available};else{st.available=Math.max(0,Math.min(st.cap,+body.available||st.available));event("station.synced","Station "+st.id+" synchronisée");save();data={station_id:st.id,synced:true,available:st.available}}}else if(rm){let r=rental(rm[1]),a=rm[2];if(!r)throw Error("Location introuvable");if(!a)data=r;else if(a==="events")data={data:s.events.filter(x=>x.rid===r.id)};else if(a==="checkout")data=checkout(r.id,body.payment_method||"card",key);else data=cancel(r.id)}else throw Error("Route inconnue")}return{ok:true,status:200,request_id:id("req"),data}}catch(e){return{ok:false,status:400,error:{code:"DEMO_REQUEST_FAILED",message:e.message}}}}function shell(){document.querySelector("#app").innerHTML=`<header class="top"><div class="brand">⚡ chargeurs.<b>ch</b></div><div class="actions"><span class="badge ok label">Démo API opérationnelle</span><button class="btn sm" data-act="auth">${user()?user().name:"Connexion"}</button></div></header><div class="layout"><nav>${nav("overview","Vue générale")}${nav("site","Site public")}${nav("kiosk","Kiosk")}${nav("client","Compte client")}${nav("admin","Administration")}${nav("api","Platform API v1")}<div class="note">Les parcours fonctionnent et persistent dans ce navigateur. Stripe, Supabase et ChargeNow sont simulés : aucun effet réel.</div></nav><main>${overview()}${publicSite()}${kiosk()}${client()}${admin()}${api()}</main></div><div class="mobile"><button data-page="overview">Accueil</button><button data-page="kiosk">Kiosk</button><button data-page="client">Client</button><button data-page="admin">Admin</button><button data-page="api">API</button></div>`;bind();go(location.hash.slice(1)||"overview");timer()}function go(p){let ok=["overview","site","kiosk","client","admin","api"].includes(p)?p:"overview";document.querySelectorAll(".page").forEach(x=>x.classList.toggle("on",x.id===ok));document.querySelectorAll("[data-page]").forEach(x=>x.classList.toggle("on",x.dataset.page===ok));history.replaceState(null,"","#"+ok);scrollTo(0,0)}function modal(html){let m=document.querySelector("#modal");m.innerHTML=`<div class="modalbox">${html}</div>`;m.classList.add("open");m.onclick=e=>{if(e.target===m)close()}}function close(){let m=document.querySelector("#modal");m.classList.remove("open");m.innerHTML=""}function login(role){let email=role==="admin"?"admin@chargeurs.ch":"client@chargeurs.ch",pass=role==="admin"?"Admin123!":"Demo123!";modal(`<div class="mhead"><div><div class="ey">Connexion démo</div><h2 style="margin:5px 0">${role==="admin"?"Administrateur":"Client"}</h2></div><button class="btn sm" id="x">Fermer</button></div><div class="field"><label>E-mail</label><input id="le" value="${email}"></div><div class="field" style="margin-top:10px"><label>Mot de passe</label><input id="lp" type="password" value="${pass}"></div><div class="heroact"><button class="btn primary" id="ls">Se connecter</button></div>`);document.querySelector("#x").onclick=close;document.querySelector("#ls").onclick=()=>{let u=s.users.find(x=>x.email===document.querySelector("#le").value&&x.pass===document.querySelector("#lp").value);if(!u)return toast("Identifiants incorrects");auth={userId:u.id};saveAuth();close();shell();go(u.role);toast("Bienvenue "+u.name)}}function showReturn(non){let r=current();modal(`<div class="mhead"><div><div class="ey">${non?"Non-retour":"Retour"}</div><h2 style="margin:5px 0">${r.code}</h2></div><button class="btn sm" id="x">Fermer</button></div><div class="field"><label>Borne de retour</label><select id="rs">${s.stations.map(x=>`<option value="${x.id}">${x.id} — ${x.name}</option>`).join("")}</select></div><p class="muted" style="margin-top:12px">${non?"30 CHF capturés et 69 CHF placés en complément requis.":r.method==="card"?"Capture uniquement du coût calculé.":"Remboursement TWINT de la différence."}</p><div class="heroact"><button class="btn ${non?"warn":"good"}" id="rc">Confirmer</button></div>`);document.querySelector("#x").onclick=close;document.querySelector("#rc").onclick=()=>{settle(r.id,document.querySelector("#rs").value,non);close();shell();go("client");toast("Règlement terminé")}}function inspect(rid){let r=rental(rid);modal(`<div class="mhead"><div><div class="ey">Location</div><h2 style="margin:5px 0">${r.code}</h2>${badge(r.status)}</div><button class="btn sm" id="x">Fermer</button></div><div class="grid two"><div class="card"><b>Batterie</b><div class="code muted">${r.batteryId||"—"}</div><b>tradeNo</b><div class="code muted">${r.tradeNo}</div></div><div class="card"><b>Final</b><div class="val">${money(r.final)}</div><div class="muted small">Capturé ${money(r.captured)} · remboursé ${money(r.refunded)}</div></div></div>`);document.querySelector("#x").onclick=close}function send(){let body={};try{body=JSON.parse(document.querySelector("#ab").value||"{}") }catch{return toast("JSON invalide")};let out=mock(document.querySelector("#am").value,document.querySelector("#ap").value,body,document.querySelector("#ai").value);document.querySelector("#resp").textContent=JSON.stringify(out,null,2);save();toast(out.ok?"Requête exécutée":out.error.message)}function bind(){document.querySelectorAll("[data-page]").forEach(x=>x.onclick=()=>go(x.dataset.page));document.querySelectorAll("[data-station]").forEach(x=>x.onclick=()=>{s.selectedStation=x.dataset.station;save();shell();go("kiosk")});document.querySelectorAll("[data-login]").forEach(x=>x.onclick=()=>login(x.dataset.login));document.querySelectorAll("[data-ep]").forEach(x=>x.onclick=()=>{s.ep=+x.dataset.ep;save();shell();go("api")});document.querySelectorAll("[data-inspect]").forEach(x=>x.onclick=()=>inspect(x.dataset.inspect));document.querySelectorAll("[data-sync]").forEach(x=>x.onclick=()=>{event("station.synced","Station "+x.dataset.sync+" synchronisée");save();shell();go("admin");toast("Synchronisation terminée")});document.querySelectorAll("[data-toggle]").forEach(x=>x.onclick=()=>{let st=station(x.dataset.toggle);st.online=!st.online;save();shell();go("admin")});document.querySelectorAll("[data-resolve]").forEach(x=>x.onclick=()=>{s.incidents.find(i=>i.id===x.dataset.resolve).open=false;save();shell();go("admin")});let sel=document.querySelector("#stationSel");if(sel)sel.onchange=e=>{s.selectedStation=e.target.value;save();shell();go("kiosk")};let mins=document.querySelector("#mins");if(mins)mins.oninput=e=>{s.minutes=+e.target.value;document.querySelector("#minsLabel").textContent=s.minutes+" min";document.querySelector("#quote").textContent=money(quote(s.minutes).total_cents);save()};document.querySelectorAll("[data-act]").forEach(x=>x.onclick=()=>{let a=x.dataset.act;try{if(a==="start"){createRental(s.selectedStation,id("idem"));shell();go("kiosk")}else if(a==="card"){checkout(current().id,"card",id("idem"));shell();go("kiosk");toast("Autorisation carte confirmée")}else if(a==="twint"){checkout(current().id,"twint",id("idem"));shell();go("kiosk");toast("TWINT prépayé")}else if(a==="cancel"){cancel(current().id);shell();go("kiosk")}else if(a==="return")showReturn(false);else if(a==="nonreturn")showReturn(true);else if(a==="new"){s.current=null;save();shell();go("kiosk")}else if(a==="logout"){auth=null;saveAuth();shell();go("overview")}else if(a==="reset"){s=seed();auth=null;save();saveAuth();shell();go("overview")}else if(a==="send")send();else if(a==="auth")user()?go(user().role):login("client")}catch(e){toast(e.message)}})}let th;function timer(){clearInterval(th);th=setInterval(()=>{let el=document.querySelector("#timer"),r=current();if(!el||!r||r.status!=="active")return;let sec=Math.floor((Date.now()-new Date(r.started).getTime())/1000),h=String(Math.floor(sec/3600)).padStart(2,"0"),m=String(Math.floor(sec%3600/60)).padStart(2,"0"),z=String(sec%60).padStart(2,"0");el.textContent=h+":"+m+":"+z},1000)}shell()})();
</script></body></html>
