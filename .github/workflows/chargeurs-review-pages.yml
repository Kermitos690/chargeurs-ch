name: Chargeurs.ch Review Pages

# Emergency cost control: manual execution only.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: chargeurs-review-pages-manual
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
      - name: Verify static review
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f .nojekyll
          ! grep -Eiq '(sk_live_|sk_test_|service_role|CHARGENOW_APP_SECRET|SUPABASE_SERVICE_ROLE)' index.html
          grep -F 'aucune opération réelle' index.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
