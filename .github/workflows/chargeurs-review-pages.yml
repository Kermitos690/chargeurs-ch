name: Chargeurs.ch Review Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: chargeurs-review-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout static review branch
        uses: actions/checkout@v4
        with:
          ref: github-review-preview
      - name: Verify static review boundaries
        shell: bash
        run: |
          set -euo pipefail
          test -f preview/index.html
          ! grep -Eiq '(sk_live_|sk_test_|service_role|CHARGENOW_APP_SECRET|SUPABASE_SERVICE_ROLE)' preview/index.html
          grep -F 'aucune opération réelle' preview/index.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: preview
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
